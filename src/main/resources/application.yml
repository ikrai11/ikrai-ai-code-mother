spring:
  application:
    name: ikrai-ai-code-mother-backed
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ikrai_ai_code_mother
    username: root
    password: 123456
server:
  port: 8123
  servlet:
    context-path: /api
  session:
    cookie:
      path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.aistd.ikraiaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
